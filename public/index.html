<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="개역개정 한글 성경을 온라인으로 읽고 공유할 수 있는 웹앱입니다.">
  <title>개역개정 성경</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <!-- 헤더 -->
    <header id="header">
      <button id="back-btn" class="header-btn hidden" aria-label="뒤로가기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <h1 id="header-title">개역개정 성경</h1>
      <button id="theme-toggle" class="header-btn" aria-label="테마 변경">
        <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg class="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </header>

    <!-- 메인 컨텐츠 -->
    <main id="main">
      <!-- 책 목록 뷰 -->
      <section id="books-view" class="view active">
        <div class="testament-tabs">
          <button class="tab-btn active" data-testament="Old">구약</button>
          <button class="tab-btn" data-testament="New">신약</button>
        </div>
        <div id="books-list" class="books-grid"></div>
      </section>

      <!-- 장 선택 뷰 -->
      <section id="chapters-view" class="view">
        <div id="chapters-grid" class="chapters-grid"></div>
      </section>

      <!-- 구절 뷰 -->
      <section id="verses-view" class="view">
        <div id="verses-content" class="verses-content"></div>
      </section>
    </main>

    <!-- 공유 FAB 버튼 -->
    <button id="share-fab" class="fab hidden" aria-label="공유하기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3" />
        <circle cx="6" cy="12" r="3" />
        <circle cx="18" cy="19" r="3" />
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
      </svg>
    </button>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast hidden">클립보드에 복사되었습니다</div>
  </div>

  <script src="app.js"></script>
</body>

</html>
