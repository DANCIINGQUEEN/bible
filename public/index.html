<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="개역개정 한글 성경을 온라인으로 읽고 공유할 수 있는 웹앱입니다.">
  <title>개역개정 성경</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="성경">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <!-- 헤더 -->
    <header id="header">
      <button id="back-btn" class="header-btn hidden" aria-label="뒤로가기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <h1 id="header-title">개역개정 성경</h1>
      <button id="settings-btn" class="header-btn" aria-label="설정">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </header>

    <!-- 설정 팝업 -->
    <div id="settings-overlay" class="settings-overlay hidden"></div>
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-header">
        <span class="settings-title">설정</span>
        <button id="settings-close" class="settings-close-btn" aria-label="닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <!-- 다크모드 -->
      <div class="settings-item">
        <span class="settings-label">다크 모드</span>
        <button id="theme-toggle" class="toggle-switch" aria-label="다크모드 토글">
          <span class="toggle-knob"></span>
        </button>
      </div>

      <!-- 폰트 크기 -->
      <div class="settings-item">
        <span class="settings-label">글자 크기</span>
        <div class="font-size-control">
          <button id="font-size-down" class="size-btn" aria-label="글자 작게">−</button>
          <span id="font-size-value" class="size-value">16</span>
          <button id="font-size-up" class="size-btn" aria-label="글자 크게">+</button>
        </div>
      </div>

      <!-- 볼드체 -->
      <div class="settings-item">
        <span class="settings-label">굵은 글씨</span>
        <button id="bold-toggle" class="toggle-switch" aria-label="볼드 토글">
          <span class="toggle-knob"></span>
        </button>
      </div>

      <!-- 글씨체 -->
      <div class="settings-item settings-item-col">
        <span class="settings-label">글씨체</span>
        <div class="font-family-options" id="font-family-options">
          <button class="font-option active" data-font="serif">명조체</button>
          <button class="font-option" data-font="sans">고딕체</button>
          <button class="font-option" data-font="pretendard">프리텐다드</button>
        </div>
      </div>

      <!-- 하단 정렬 -->
      <div class="settings-item">
        <span class="settings-label">하단 정렬</span>
        <button id="bottom-align-toggle" class="toggle-switch" aria-label="하단 정렬 토글">
          <span class="toggle-knob"></span>
        </button>
      </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <main id="main">
      <!-- 책 목록 뷰 -->
      <section id="books-view" class="view active">
        <div class="testament-tabs">
          <button class="tab-btn active" data-testament="Old">구약</button>
          <button class="tab-btn" data-testament="New">신약</button>
          <button class="tab-btn" data-testament="Hymn">찬송가</button>
        </div>
        <div id="books-list" class="books-grid"></div>
      </section>

      <!-- 장 선택 뷰 -->
      <section id="chapters-view" class="view">
        <div id="chapters-grid" class="chapters-grid"></div>
      </section>

      <!-- 찬송가 목록 뷰 -->
      <section id="hymns-view" class="view">
        <div id="hymns-grid" class="hymns-grid"></div>
      </section>

      <!-- 찬송가 악보 뷰 -->
      <section id="hymn-detail-view" class="view">
        <div id="hymn-carousel-wrap" class="chapter-carousel-wrap hidden">
          <div id="hymn-carousel" class="chapter-carousel"></div>
        </div>
        <div id="hymn-detail-content" class="hymn-detail-content"></div>
      </section>

      <!-- 구절 뷰 -->
      <section id="verses-view" class="view">
        <div id="chapter-carousel-wrap" class="chapter-carousel-wrap">
          <div id="chapter-carousel" class="chapter-carousel"></div>
        </div>
        <div id="verses-content" class="verses-content"></div>
        <div id="chapter-nav" class="chapter-nav">
          <button id="prev-chapter" class="chapter-nav-btn" aria-label="이전 장">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            <span id="prev-label">이전</span>
          </button>
          <span id="chapter-indicator" class="chapter-indicator"></span>
          <button id="next-chapter" class="chapter-nav-btn" aria-label="다음 장">
            <span id="next-label">다음</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </div>
      </section>
    </main>

    <!-- 공유 FAB 버튼 -->
    <button id="share-fab" class="fab hidden" aria-label="공유하기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3" />
        <circle cx="6" cy="12" r="3" />
        <circle cx="18" cy="19" r="3" />
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
      </svg>
    </button>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast hidden">클립보드에 복사되었습니다</div>
  </div>

  <script src="app.js"></script>
</body>

</html>
